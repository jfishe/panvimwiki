# Tox configuration file
# Read more under https://tox.readthedocs.org/

[tox]
env_list =
    3.10
    3.13
    3.14
minversion = 4.23.2

[testenv]
description = Invoke pytest to run automated tests
package = wheel
wheel_build_env = .pkg
passenv =
    HOME
    SETUPTOOLS_*
setenv =
    TMP = {toxinidir}/tmp
    TOP = {toxinidir}
    COVERAGE_PROCESS_START = {toxinidir}/.coveragerc
dependency_groups = testing
allowlist_externals =
    bash
    make
    pandoc
    vim
commands =
    pandoc --version
    vim -Nu tests/vim/vimrc --version
    make vader
    pytest {posargs}


# To run `tox -e lint` you need to make sure you have a
# `.pre-commit-config.yaml` file. See https://prek.j178.dev/.
[testenv:lint]
description = Perform static analysis and style checks
# skip_install = True
dependency_groups = lint
deps = prek
passenv =
    HOMEPATH
    PROGRAMDATA
    SETUPTOOLS_*
commands =
    prek run --all-files {posargs:--show-diff-on-failure}


[testenv:vim]
description = Vim unit tests
changedir = {toxinidir}
passenv =
    HOME
    PANVIMWIKI_PATH
    TMP
    VADER_PATH
    VIMWIKI_PATH
# commands = ./run.sh
dependency_groups = vader
allowlist_externals =
    make
    pandoc
    vim
commands =
    covimerage --version
    pandoc --version
    make vader
    covimerage --rcfile={toxinidir}/.covimeragerc run --report-options '--show-missing' vim -Nu tests/vim/vimrc -Es -c 'Vader! tests/vim/*.vader'


[testenv:{build,clean}]
description =
    build: Build the package in isolation according to PEP517, see https://github.com/pypa/build
    clean: Remove old distribution files and temporary build artifacts (./build and ./dist)
# https://setuptools.pypa.io/en/stable/build_meta.html#how-to-use-it
skip_install = True
changedir = {toxinidir}
deps =
    build: build[virtualenv]
passenv =
    SETUPTOOLS_*
commands =
    clean: python -c 'import shutil; [shutil.rmtree(p, True) for p in ("build", "dist", "docs/_build")]'
    clean: python -c 'import pathlib, shutil; [shutil.rmtree(p, True) for p in pathlib.Path("src").glob("*.egg-info")]'
    build: python -m build {posargs}
# By default, both `sdist` and `wheel` are built. If your sdist is too big or you don't want
# to make it available, consider running: `tox -e build -- --wheel`


[testenv:{docs,doctests,linkcheck}]
description =
    docs: Invoke sphinx-build to build the docs
    doctests: Invoke sphinx-build to run doctests
    linkcheck: Check for broken links in the documentation
passenv =
    SETUPTOOLS_*
setenv =
    DOCSDIR = {toxinidir}/docs
    BUILDDIR = {toxinidir}/docs/_build
    docs: BUILD = html
    doctests: BUILD = doctest
    linkcheck: BUILD = linkcheck
dependency_groups = docs
# deps =
#     -r {toxinidir}/docs/requirements.txt
#     # ^  requirements.txt shared with Read The Docs
commands =
    sphinx-build --color -b {env:BUILD} -d "{env:BUILDDIR}/doctrees" "{env:DOCSDIR}" "{env:BUILDDIR}/{env:BUILD}" {posargs}
    bash -c 'make vimdoc || make vimdoc'
