# GitHub Actions configuration **EXAMPLE**,
# MODIFY IT ACCORDING TO YOUR NEEDS!
# Reference: https://docs.github.com/en/actions

name: Test and Publish Python 🐍 distribution 📦 to PyPI and TestPyPI

on:
  push:
    # Avoid using all the resources/limits available by checking only
    # relevant branches and tags. Other branches can be checked via PRs.
    branches: [main]
    tags: ["v[0-9]*", "[0-9]+.[0-9]+*"] # Match tags that resemble a version
  pull_request: # Run in every PR
  workflow_dispatch: # Allow manually triggering the workflow
  schedule:
    # Run roughly every 15 days at 00:00 UTC
    # (useful to check if updates on dependencies break the package)
    - cron: "0 0 1,16 * *"

permissions:
  contents: read

concurrency:
  group: >-
    ${{ github.workflow }}-${{ github.ref_type }}-
    ${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      wheel-distribution: ${{ steps.wheel-distribution.outputs.path }}
    steps:
      - uses: actions/checkout@v5
        with: { fetch-depth: 0 } # deep clone for setuptools-scm
      - uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.12"
      - name: Install the latest version of uv and set the python version
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.12"
          # python-version: ${{ matrix.python-version }}
      - name: Run static analysis and format checkers
        run: uv tool run prek run --all-files --show-diff-on-failure
      - name: Build package distribution files 📦
        run: >-
          uv tool run tox -e clean,build
      - name: Record the path of wheel distribution
        id: wheel-distribution
        run: echo "path=$(ls dist/*.whl)" >> $GITHUB_OUTPUT
      - name: Store the distribution files for use in other stages
        # `tests` and `publish` will use the same pre-built distributions,
        # so we make sure to release the exact same package that was tested
        uses: actions/upload-artifact@v6
        with:
          name: python-distribution-files
          path: dist/
          retention-days: 1

  test:
    needs: prepare
    strategy:
      matrix:
        python:
          - "3.12" # Required by rhysd/action-setup-vim@v1 on ubuntu-latest
        platform:
          - ubuntu-latest
        # - macos-latest
        # - windows-latest
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5
      - uses: nikeee/setup-pandoc@v1
        with:
          pandoc-version: 3.8 # Compatible with tests for reference_citation.py
      - uses: astral-sh/setup-uv@v3
        with:
          python-version: ${{ matrix.python }}
      - uses: rhysd/action-setup-vim@v1
      - name: Retrieve pre-built distribution files
        uses: actions/download-artifact@v7
        with:
          name: python-distribution-files
          path: dist/
      - name: Run tests
        run: >-
          uv tool run tox --installpkg '${{ needs.prepare.outputs.wheel-distribution }}' \
            -e '${{ matrix.python }}' -- -rFEx --durations 10 --color yes -vv
      - name: Generate coverage report
        run: uv tool run coverage lcov -o coverage.lcov
      - name: Coveralls GitHub Action
        uses: coverallsapp/github-action@v2
        with:
          file: coverage.lcov
          github-token: ${{ secrets.GITHUB_TOKEN }}
          flag-name: ${{ matrix.platform }} - py${{ matrix.python }}
          parallel: true

  finalize:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Finalize coverage report
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          parallel-finished: true

  publish-to-testpypi:
    name: Publish Python 🐍 distribution 📦 to TestPyPI
    needs: finalize
    if: ${{ github.event_name == 'push' && contains(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest

    environment:
      name: testpypi
      url: https://test.pypi.org/p/panvimwiki

    permissions:
      id-token: write # IMPORTANT: mandatory for trusted publishing

    steps:
      - name: Retrieve pre-built distribution files
        uses: actions/download-artifact@v7
        with:
          name: python-distribution-files
          path: dist/
      - name: Publish distribution 📦 to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-to-pypi:
    name: >-
      Publish Python 🐍 distribution 📦 to PyPI
    needs: [finalize, publish-to-testpypi]
    if: ${{ github.event_name == 'push' && contains(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/panvimwiki # Replace <package-name> with your PyPI project name
    permissions:
      # contents: write
      id-token: write # IMPORTANT: mandatory for trusted publishing
    steps:
      - name: Retrieve pre-built distribution files
        uses: actions/download-artifact@v7
        with:
          name: python-distribution-files
          path: dist/
      - name: Publish distribution 📦 to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: >-
      Sign the Python 🐍 distribution 📦 with Sigstore,
      create release notes from ChangeLog,
      and upload them to GitHub Release
    needs:
      - publish-to-pypi
    runs-on: ubuntu-latest

    permissions:
      contents: write # IMPORTANT: mandatory for making GitHub Releases
      id-token: write # IMPORTANT: mandatory for sigstore

    steps:
      - uses: actions/checkout@v5
      - uses: CSchoel/release-notes-from-changelog@v1
      - name: Download all the dists
        uses: actions/download-artifact@v7
        with:
          name: python-distribution-files
          path: dist/
      - name: Sign the dists with Sigstore
        uses: sigstore/gh-action-sigstore-python@v3.2.0
        with:
          inputs: >-
            ./dist/*.tar.gz
            ./dist/*.whl
      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: >-
          gh release create
          '${{ github.ref_name }}'
          --repo '${{ github.repository }}'
          --notes ""
          --draft
      - name: Update release notes from changelog
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: >-
          gh release edit
          '${{ github.ref_name }}'
          --notes-file RELEASE.md
          --title "Version $RELEASE_VERSION"
          --draft=false
      - name: Upload artifact signatures to GitHub Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        # Upload to GitHub Release using the `gh` CLI.
        # `dist/` contains the built packages, and the
        # sigstore-produced signatures and certificates.
        run: >-
          gh release upload
          '${{ github.ref_name }}' dist/**
          --repo '${{ github.repository }}'
